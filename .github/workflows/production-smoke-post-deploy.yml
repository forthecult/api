name: Production Smoke (post-deploy)

on:
  workflow_run:
    workflows: ["CI (typecheck + build)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webapp-production-smoke
  cancel-in-progress: true

jobs:
  smoke-production:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'production')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
      PRODUCTION_SMOKE_WEBHOOK_URL: ${{ secrets.PRODUCTION_SMOKE_WEBHOOK_URL }}
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate required secrets
        run: |
          test -n "$BASE_URL" || {
            echo "Missing PRODUCTION_BASE_URL secret";
            exit 1;
          }

      - name: Wait for production health endpoint
        run: |
          set -euo pipefail
          echo "Waiting for $BASE_URL/api/health ..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.txt -w "%{http_code}" "$BASE_URL/api/health" || true)
            if [ "$code" = "200" ]; then
              echo "Production is healthy"
              cat /tmp/health.txt || true
              exit 0
            fi
            echo "Attempt $i/30: health not ready (HTTP $code)"
            sleep 10
          done
          echo "Timed out waiting for production health"
          exit 1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run production core smoke suite
        run: bun run smoke:staging

      - if: failure()
        name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production-smoke
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - if: failure() && env.PRODUCTION_SMOKE_WEBHOOK_URL != ''
        name: Alert production smoke failure webhook
        run: |
          payload=$(cat <<EOF
          {
            "text": "Production smoke failed for branch ${GITHUB_REF_NAME}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF
          )
          curl -sS -X POST "$PRODUCTION_SMOKE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$payload"

