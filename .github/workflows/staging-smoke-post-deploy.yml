name: Staging Smoke (post-deploy)

on:
  workflow_run:
    workflows: ["CI (typecheck + build)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webapp-staging-smoke
  cancel-in-progress: true

jobs:
  smoke-staging:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'staging')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_SMOKE_WEBHOOK_URL: ${{ secrets.STAGING_SMOKE_WEBHOOK_URL }}
      STAGING_REDEPLOY_WEBHOOK_URL: ${{ secrets.STAGING_REDEPLOY_WEBHOOK_URL }}
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate required secrets
        run: |
          test -n "$BASE_URL" || {
            echo "Missing STAGING_BASE_URL secret";
            exit 1;
          }

      - name: Verify deployed revision (attempt 1)
        id: verify_deploy_1
        continue-on-error: true
        run: |
          set -euo pipefail
          echo "Waiting for $BASE_URL/api/health and commit $TARGET_SHA ..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "$BASE_URL/api/health" || true)
            if [ "$code" = "200" ]; then
              commit_short=$(node -e "try { const fs = require('fs'); const j = JSON.parse(fs.readFileSync('/tmp/health.json', 'utf8')); process.stdout.write(j.commitShaShort || ''); } catch { process.stdout.write(''); }")
              target_short=$(echo "$TARGET_SHA" | cut -c1-12)
              if [ -n "$commit_short" ] && [ "$commit_short" = "$target_short" ]; then
                echo "Staging deploy verified at target commit prefix $commit_short"
                exit 0
              fi
              echo "Health is up but commit mismatch (got '$commit_short', expected '$target_short')"
            fi
            echo "Attempt $i/30: deploy not verified yet (HTTP $code)"
            sleep 10
          done
          echo "Timed out verifying deployed revision on staging"
          exit 1

      - name: Trigger one auto-redeploy attempt
        if: steps.verify_deploy_1.outcome == 'failure' && env.STAGING_REDEPLOY_WEBHOOK_URL != ''
        run: curl -sS -X POST "$STAGING_REDEPLOY_WEBHOOK_URL"

      - name: Verify deployed revision (attempt 2 after auto-redeploy)
        id: verify_deploy_2
        if: steps.verify_deploy_1.outcome == 'failure' && env.STAGING_REDEPLOY_WEBHOOK_URL != ''
        run: |
          set -euo pipefail
          echo "Re-checking $BASE_URL/api/health for commit $TARGET_SHA after auto-redeploy ..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "$BASE_URL/api/health" || true)
            if [ "$code" = "200" ]; then
              commit_short=$(node -e "try { const fs = require('fs'); const j = JSON.parse(fs.readFileSync('/tmp/health.json', 'utf8')); process.stdout.write(j.commitShaShort || ''); } catch { process.stdout.write(''); }")
              target_short=$(echo "$TARGET_SHA" | cut -c1-12)
              if [ -n "$commit_short" ] && [ "$commit_short" = "$target_short" ]; then
                echo "Staging deploy verified at target commit prefix $commit_short"
                exit 0
              fi
              echo "Health is up but commit mismatch (got '$commit_short', expected '$target_short')"
            fi
            echo "Attempt $i/30: deploy not verified yet (HTTP $code)"
            sleep 10
          done
          echo "Timed out verifying deployed revision after auto-redeploy"
          exit 1

      - name: Fail when deploy is not verified
        if: steps.verify_deploy_1.outcome == 'failure' && (env.STAGING_REDEPLOY_WEBHOOK_URL == '' || steps.verify_deploy_2.outcome == 'failure')
        run: |
          echo "Staging deployment verification failed (target commit not active)."
          exit 1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run staging core smoke suite (retry once)
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            echo "Core smoke attempt $attempt/2"
            if bun run smoke:staging; then
              exit 0
            fi
            if [ "$attempt" -eq 1 ]; then
              echo "First run failed; retrying after short delay..."
              sleep 20
            fi
          done
          exit 1

      - name: Run staging extended smoke suite (non-blocking signal)
        continue-on-error: true
        run: bun run smoke:staging:extended

      - if: failure()
        name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging-smoke
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - if: failure() && env.STAGING_SMOKE_WEBHOOK_URL != ''
        name: Alert smoke failure webhook
        run: |
          payload=$(cat <<EOF
          {
            "text": "Staging smoke failed for branch ${GITHUB_REF_NAME}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF
          )
          curl -sS -X POST "$STAGING_SMOKE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$payload"

