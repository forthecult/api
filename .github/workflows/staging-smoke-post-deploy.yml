name: Staging Smoke (post-deploy)

on:
  workflow_run:
    workflows: ["CI (typecheck + build)"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: webapp-staging-smoke
  cancel-in-progress: true

jobs:
  smoke-staging:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'staging')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_SMOKE_WEBHOOK_URL: ${{ secrets.STAGING_SMOKE_WEBHOOK_URL }}
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate required secrets
        run: |
          test -n "$BASE_URL" || {
            echo "Missing STAGING_BASE_URL secret";
            exit 1;
          }

      - name: Wait for staging health endpoint
        run: |
          set -euo pipefail
          echo "Waiting for $BASE_URL/api/health ..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /tmp/health.txt -w "%{http_code}" "$BASE_URL/api/health" || true)
            if [ "$code" = "200" ]; then
              echo "Staging is healthy"
              cat /tmp/health.txt || true
              exit 0
            fi
            echo "Attempt $i/30: health not ready (HTTP $code)"
            sleep 10
          done
          echo "Timed out waiting for staging health"
          exit 1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run staging smoke suite (retry once on transient failure)
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            echo "Smoke attempt $attempt/2"
            if bun run smoke:staging; then
              exit 0
            fi
            if [ "$attempt" -eq 1 ]; then
              echo "First run failed; retrying after short delay..."
              sleep 20
            fi
          done
          exit 1

      - if: failure()
        name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging-smoke
          path: |
            webapp/playwright-report
            webapp/test-results
          if-no-files-found: ignore

      - if: failure() && env.STAGING_SMOKE_WEBHOOK_URL != ''
        name: Alert smoke failure webhook
        run: |
          payload=$(cat <<EOF
          {
            "text": "Staging smoke failed for branch ${GITHUB_REF_NAME}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF
          )
          curl -sS -X POST "$STAGING_SMOKE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "$payload"
