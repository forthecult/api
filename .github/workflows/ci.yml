# Run typecheck and build on push/PR so deployment never gets broken code.
# Catches: missing imports, type errors, and any failure that would break "bun run build".

name: CI (typecheck + build)

on:
  push:
    branches: [main, master, staging, production]
  pull_request:
    branches: [main, master, staging, production]

# Pin default permissions to read-only so a compromised action can't push,
# release, or mutate issues/PRs on our behalf. Jobs that need write access
# request it explicitly.
permissions:
  contents: read

concurrency:
  group: webapp-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Block invalid import specifiers
        run: bun run check:imports

      - name: Verify admin auth wiring
        run: bun run scripts/verify-admin-auth.ts

      - name: Verify CSRF origin coverage (SOC 2 CC6.1)
        run: bun run scripts/verify-csrf-origin.ts

      - name: Email templates render check
        run: bun run email:templates-check

      - name: Category page runtime guard test
        run: bun run test:review-normalization

      - name: Build
        run: bun run build

  smoke-core:
    name: Smoke core flows (pre-staging gate)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Build app for production-mode smoke
        run: bun run build

      - name: Run core smoke suite (chromium)
        env:
          CI: "1"
        run: bun run smoke:core

      - if: failure()
        name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-core-smoke
          path: |
            webapp/playwright-report
            webapp/test-results
          if-no-files-found: ignore
