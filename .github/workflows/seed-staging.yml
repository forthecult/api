# Run from GitHub Actions so DATABASE_URL never touches your machine.
# Required secrets: repo Settings → Secrets and variables → Actions:
#   DATABASE_URL       - Railway (or other) Postgres URL (required for seed)
#   UPLOADTHING_TOKEN  - UploadThing API token (optional). If set: brand logos, lookbook, and curated product images (Pacsafe, Trezor, etc.) are uploaded to UploadThing and DB is updated. If missing, upload steps are skipped.
# Do NOT use "if: secrets.UPLOADTHING_TOKEN != ''" — the secrets context is not allowed in job/step if: conditions and causes "Unrecognized named-value: 'secrets'" failure.
# Trigger: Actions tab → "Seed staging (DB schema + categories)" → Run workflow
#
# If the job is cancelled due to timeout, the database may still have been fully seeded
# (schema, categories, brands, shipping, products, reviews). Check your DB before re-running.

name: Seed staging (DB schema + categories)

on:
  workflow_dispatch:

# Seed job only reads the repo for scripts; pin to read-only.
permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    # Seed + optional UploadThing steps; 20m allows uploads to complete when needed
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push schema
        run: bun run db:push

      - name: Seed categories
        run: bun run db:seed-categories

      - name: Seed brands
        run: bun run db:seed-brands

      - name: Seed brand shipping options (US / International)
        run: bun run db:seed-shipping-by-brand

      - name: Seed products and reviews
        run: |
          bun run db:seed-products
          # Reviews are seeded from data/reviews-seed.json (JSON). File must be committed for staging.
          if [ ! -f data/reviews-seed.json ]; then
            echo "::error::data/reviews-seed.json is missing. Run locally: bun run db:extract-reviews (from data/reviews.csv), then commit data/reviews-seed.json"
            exit 1
          fi
          bun run db:seed-reviews

      # Optional: upload brand logos + lookbook. Requires repo secret UPLOADTHING_TOKEN (Settings → Secrets and variables → Actions).
      # When token is set, we run upload steps and fail the job if uploads fail. When token is missing, we skip upload steps.
      - name: Check UploadThing token
        id: check_uploadthing
        env:
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
        run: |
          if [ -n "$UPLOADTHING_TOKEN" ]; then
            echo "token_set=true" >> "$GITHUB_OUTPUT"
            echo "UploadThing: token is set — brand logos, lookbook, and curated product images will be uploaded."
          else
            echo "token_set=false" >> "$GITHUB_OUTPUT"
            echo "UploadThing: token not set — add UPLOADTHING_TOKEN in repo Settings → Secrets and variables → Actions to upload brand logos, lookbook, and curated product images."
          fi

      - name: Upload brand logos to UploadThing and update DB
        if: steps.check_uploadthing.outputs.token_set == 'true'
        env:
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
        run: bun run db:upload-brand-assets
        timeout-minutes: 10
        continue-on-error: true

      - name: Upload lookbook to UploadThing
        if: steps.check_uploadthing.outputs.token_set == 'true'
        env:
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
        run: bun run db:upload-lookbook
        timeout-minutes: 8
        continue-on-error: true

      - name: Upload curated product images to UploadThing
        if: steps.check_uploadthing.outputs.token_set == 'true'
        env:
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
        run: bun run db:upload-curated-product-images
        timeout-minutes: 15
        continue-on-error: true

      - name: Upload lookbook manifest artifact (optional)
        if: steps.check_uploadthing.outputs.token_set == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lookbook-images-json
          path: data/lookbook-images.json
          if-no-files-found: ignore
