# Run from GitHub Actions so DATABASE_URL never touches your machine.
# Required secrets: repo Settings → Secrets and variables → Actions:
#   DATABASE_URL       - Railway (or other) Postgres URL
#   UPLOADTHING_TOKEN  - For brand logo uploads (optional; omit to skip brand assets)
# Trigger: Actions tab → "Seed staging (DB schema + categories)" → Run workflow

name: Seed staging (DB schema + categories)

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push schema and seed categories, brands, shipping, products, reviews
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          bun run db:push
          bun run db:seed:staging

      - name: Upload brand logos to UploadThing and update DB
        if: ${{ secrets.UPLOADTHING_TOKEN != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
        run: bun run db:upload-brand-assets
