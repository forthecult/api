name: Security Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: "0 0 * * 0"

jobs:
  security-check:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for gitleaks to scan full history

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve working directory
        id: wd
        run: |
          if [ -d webapp ] && [ -f webapp/package.json ]; then
            echo "dir=webapp" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: ${{ steps.wd.outputs.dir }}
        run: bun install --frozen-lockfile

      - name: Run Gitleaks (Secret Scanning)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run NPM Audit
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          npm audit --audit-level=moderate --json > npm-audit-report.json || true
          cat npm-audit-report.json | jq '.metadata // {"vulnerabilities": "check report"}' || true
        continue-on-error: true

      - name: Run Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            p/typescript
            p/javascript
        continue-on-error: true

    - name: Run Grype (Dependency Scanning)
      uses: anchore/scan-action@v3
      with:
        image: ""
        path: ${{ steps.wd.outputs.dir }}
        severity-cutoff: medium
        fail-build: false

    - name: Run Snyk SCA Scan
      working-directory: ${{ steps.wd.outputs.dir }}
      run: |
        echo "🔐 Running Snyk SCA scan..."
        npm install -g snyk
        snyk test --severity-threshold=high --json > snyk-report.json || true
        # Parse and display summary
        cat snyk-report.json | jq -r '
          if .vulnerabilities then
            "Snyk Scan Summary:",
            (.vulnerabilities | group_by(.severity) | map({severity: .[0].severity, count: length}) | .[] | "  \(.severity | ascii_upcase): \(.count)"),
            "",
            "Top vulnerabilities:",
            (.vulnerabilities | sort_by(if .cvssScore then -(.cvssScore | tonumber) else 0 end) | .[0:5] | .[] |
              "  \(.severity | ascii_upcase) \(.cvssScore // "N/A"): \(.packageName)@\(.version) - \(.title)"
            )
          else
            "No vulnerabilities found or scan incomplete"
          end
        ' || echo "Scan completed - see snyk-report.json for details"
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true

    - name: Snyk Monitor (Continuous Monitoring)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      working-directory: ${{ steps.wd.outputs.dir }}
      run: |
        echo "🔄 Setting up Snyk continuous monitoring..."
        snyk monitor --org=for-the-cult || echo "Monitor setup completed"
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          ${{ steps.wd.outputs.dir }}/npm-audit-report.json
          ${{ steps.wd.outputs.dir }}/snyk-report.json
        retention-days: 30

  dependency-update:
    name: Dependency Update Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve working directory
        id: wd
        run: |
          if [ -d webapp ] && [ -f webapp/package.json ]; then
            echo "dir=webapp" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Check for outdated dependencies
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          echo "## Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          bun outdated --json | jq -r '.[] | "- \(.name): \(.current) → \(.latest)"' >> $GITHUB_STEP_SUMMARY || echo "No outdated dependencies found"

      - name: Security audit summary
        working-directory: ${{ steps.wd.outputs.dir }}
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate --json | jq '.metadata.vulnerabilities' >> $GITHUB_STEP_SUMMARY || true
